# Talos Engine - Flowcore Configuration
# Framework-wide settings for browsers, proxies, and registrars

browser:
  headless: true
  viewport:
    width: 1280
    height: 720
  timeout: 30000
  locale: "en-US"
  timezone: "America/Chicago"
  color_scheme: "dark"

proxy:
  # Proxy list file (one per line: protocol://user:pass@host:port)
  pool_file: "data/proxies.txt"
  # How often to refresh proxy list (seconds)
  refresh_interval: 3600
  # Max concurrent proxy health checks
  max_concurrent_checks: 20
  # Health check timeout (seconds)
  check_timeout: 15
  # Test URL for proxy validation
  test_url: "https://httpbin.org/ip"

registrars:
  # Supported platforms for account creation
  platforms:
    - discord
    - fiverr
    - reddit
  # Delay range between form fields (min, max seconds)
  typing_delay: [0.05, 0.2]
  # Delay between page navigation actions
  nav_delay: [1.0, 3.0]
  # Screenshot directory for debugging
  screenshot_dir: "data/screenshots"
  # Max retries for captcha/timeout failures
  max_retries: 3

scraper:
  # Default user agent rotation (leave empty for fingerprint module)
  user_agents: []
  # Request delay range (seconds)
  delay: [2, 5]
  # Max concurrent scraping tasks
  max_concurrent: 5

watcher:
  # Check interval for pipeline monitoring (seconds)
  check_interval: 300
  # Alert thresholds
  thresholds:
    disk_percent: 85
    ram_percent: 90
    cpu_percent: 95
  # Notification webhook (Telegram bot token required)
  alert_webhook: ""

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "data/flowcore.log"
